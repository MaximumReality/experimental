<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutrition Lab</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Search & Scan Section */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* Prevents iOS zoom on focus */
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
        }

        /* Results Display */
        .result-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none; /* Hidden until data arrives */
        }

        .warning-banner {
            background: var(--danger);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
        }

        .product-header h2 { margin: 0; color: var(--dark); }
        .product-header p { margin: 5px 0 15px; color: #7f8c8d; }

        .nutri-score {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 800;
            color: white;
            margin-bottom: 15px;
        }

        .nutrition-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .nutrition-table td {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .ingredients-box {
            background: #fdfdfd;
            border-left: 4px solid var(--primary);
            padding: 10px;
            font-size: 0.9em;
            line-height: 1.4;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Nutrition Lab</h1>
    </header>

    <div class="input-group">
        <input type="text" id="foodSearch" placeholder="Enter brand or name...">
        <button onclick="searchByName()">Search</button>
    </div>

    <button onclick="startScanner()" style="width:100%; background: var(--dark); margin-bottom: 20px;">
        📷 Scan Barcode
    </button>

    <div id="reader"></div>

    <div id="resultCard" class="result-card">
        <div id="allergenAlert"></div>
        
        <div class="product-header">
            <h2 id="pName">Product Name</h2>
            <p id="pBrand">Brand Name</p>
        </div>

        <div id="nScore" class="nutri-score">Nutri-Score</div>

        <table class="nutrition-table" id="nTable">
            </table>

        <h3>Ingredients</h3>
        <div class="ingredients-box" id="pIngredients">
            Full ingredient list will appear here...
        </div>
    </div>
</div>

<script>
    // 1. CUSTOMIZE THIS: Add any specific allergens for her husband here
// Use the format "en:ingredient-name"
const watchList = ["en:peanuts", "en:milk", "en:soy", "en:gluten", "en:eggs"];

// 2. The Scanner Setup
const html5QrCode = new Html5Qrcode("reader");

function startScanner() {
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 150 } },
        (decodedText) => {
            fetchData(decodedText);
            // Optional: stop scanning after a success to save battery
            // html5QrCode.stop(); 
        }
    ).catch(err => console.error("Camera error:", err));
}

// 3. The API Brains
async function fetchData(barcode) {
    const resultCard = document.getElementById('resultCard');
    const alertBox = document.getElementById('allergenAlert');
    
    resultCard.style.display = 'block';
    alertBox.innerHTML = 'Searching...';

    try {
        const url = `https://world.openfoodfacts.org/api/v2/product/${barcode}.json?fields=product_name,brands,ingredients_text,allergens_tags,nutriments,nutrition_grades`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.status === 1) {
            const product = data.product;

            // UI Updates
            document.getElementById('pName').innerText = product.product_name || "Unknown Product";
            document.getElementById('pBrand').innerText = product.brands || "Unknown Brand";
            document.getElementById('pIngredients').innerText = product.ingredients_text || "No ingredient list found.";

            // Allergen Logic
            const productAllergens = product.allergens_tags || [];
            const foundAllergens = productAllergens.filter(a => watchList.includes(a));

            if (foundAllergens.length > 0) {
                const names = foundAllergens.map(a => a.replace('en:', '').toUpperCase());
                alertBox.innerHTML = `<div class="warning-banner">⚠️ ALERT: CONTAINS ${names.join(', ')}</div>`;
            } else {
                alertBox.innerHTML = `<div style="color: #27ae60; text-align: center; margin-bottom: 10px; font-weight: bold;">✅ No watched allergens detected</div>`;
            }

            // Nutri-Score Logic
            const score = product.nutrition_grades ? product.nutrition_grades.toUpperCase() : "N/A";
            const scoreEl = document.getElementById('nScore');
            const colors = { 'A': '#038141', 'B': '#85BB2F', 'C': '#FECB02', 'D': '#EE8100', 'E': '#E63E11' };
            
            scoreEl.innerText = `Nutri-Score: ${score}`;
            scoreEl.style.backgroundColor = colors[score] || '#95a5a6';

            // Nutrition Table
            const n = product.nutriments;
            document.getElementById('nTable').innerHTML = `
                <tr><td>Calories</td><td>${n['energy-kcal_100g'] || 0} kcal</td></tr>
                <tr><td>Fat</td><td>${n.fat_100g || 0}g</td></tr>
                <tr><td>Sugars</td><td>${n.sugars_100g || 0}g</td></tr>
                <tr><td>Protein</td><td>${n.proteins_100g || 0}g</td></tr>
            `;

        } else {
            alertBox.innerHTML = "❌ Product not found.";
        }
    } catch (error) {
        alertBox.innerHTML = "❌ Connection Error.";
        console.error(error);
    }
}

// 4. Text Search Logic
async function searchByName() {
    const query = document.getElementById('foodSearch').value;
    if (!query) return;
    
    const response = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${query}&search_simple=1&action=process&json=1&page_size=1`);
    const data = await response.json();
    
    if (data.products && data.products.length > 0) {
        fetchData(data.products[0].code);
    } else {
        alert("Product not found by name.");
    }
}

</script>

</body>
</html>
