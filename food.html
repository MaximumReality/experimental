<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutrition Lab</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Search & Scan Section */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* Prevents iOS zoom on focus */
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
        }

        /* Results Display */
        .result-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none; /* Hidden until data arrives */
        }

        .warning-banner {
            background: var(--danger);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
        }

        .product-header h2 { margin: 0; color: var(--dark); }
        .product-header p { margin: 5px 0 15px; color: #7f8c8d; }

        .nutri-score {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 800;
            color: white;
            margin-bottom: 15px;
        }

        .nutrition-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .nutrition-table td {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .ingredients-box {
            background: #fdfdfd;
            border-left: 4px solid var(--primary);
            padding: 10px;
            font-size: 0.9em;
            line-height: 1.4;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Nutrition Lab</h1>
    </header>

    <div class="input-group">
        <input type="text" id="foodSearch" placeholder="Enter brand or name...">
        <button onclick="searchByName()">Search</button>
    </div>

    <button onclick="startScanner()" style="width:100%; background: var(--dark); margin-bottom: 20px;">
        📷 Scan Barcode
    </button>

    <div id="reader"></div>

    <div id="resultCard" class="result-card">
        <div id="allergenAlert"></div>
        
        <div class="product-header">
            <h2 id="pName">Product Name</h2>
            <p id="pBrand">Brand Name</p>
        </div>

        <div id="nScore" class="nutri-score">Nutri-Score</div>

        <table class="nutrition-table" id="nTable">
            </table>

        <h3>Ingredients</h3>
        <div class="ingredients-box" id="pIngredients">
            Full ingredient list will appear here...
        </div>
    </div>
</div>

<script>
    // JS Logic will go here to fetch API data and control the scanner
    function startScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                // Success: Barcode found
                fetchData(decodedText);
                html5QrCode.stop();
            }
        ).catch(err => console.error("Camera access denied", err));
    }

    }

    function searchByName() {
        const query = document.getElementById('foodSearch').value;

</script>

</body>
</html>
